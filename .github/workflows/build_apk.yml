name: Build & Release APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: pub get
        run: flutter pub get

      - name: Build APK Release
        run: flutter build apk --release --no-tree-shake-icons

      - name: Rinomina APK
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/album-colorare-v${VERSION}.apk
          echo "APK_NAME=album-colorare-v${VERSION}.apk" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: build/app/outputs/flutter-apk/${{ env.APK_NAME }}

      - name: Release da tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Album da Colorare ${{ github.ref_name }}"
          body: |
            ## Come installare
            1. Scarica il file .apk
            2. Su Android: Impostazioni → Sicurezza → Origini sconosciute ✅
            3. Apri l'APK e installa
          files: build/app/outputs/flutter-apk/${{ env.APK_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Pre-release automatica su main
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.VERSION }}-build.${{ github.run_number }}"
          name: "v${{ env.VERSION }} (build #${{ github.run_number }})"
          body: "Build automatica — commit ${{ github.sha }}"
          files: build/app/outputs/flutter-apk/${{ env.APK_NAME }}
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
